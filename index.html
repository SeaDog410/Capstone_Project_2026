<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest - Athletic Training Documentation & Management System</title>
    <meta name="description" content="A comprehensive application designed for athletic trainers to reduce administrative burden, ensure legal documentation compliance, and improve athlete recovery outcomes.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <i class="fa-solid fa-feather-pointed nested-logo"></i>
                    <h1 class="logo-text">The Nest</h1>
                </div>
            </div>
            
            <ul class="nav-links">
                <li class="nav-item " data-role="trainer" onclick="switchRole('trainer')">
                    <i class="fa-solid fa-user-doctor"></i> Trainer View
                </li>
                <li class="nav-item active" data-role="athlete" onclick="switchRole('athlete')">
                    <i class="fa-solid fa-person-running"></i> Athlete View
                </li>
                <li class="nav-item" data-role="coach" onclick="switchRole('coach')">
                    <i class="fa-solid fa-clipboard-user"></i> Coach View
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <header class="top-header">
                <h2 id="current-view-title">Athlete View</h2>
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-body" id="dynamic-content">
                <!-- Content injected here via JS -->
            </div>
        </main>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
